version: '3.8'

services:
  # Institutional AI Node
  ai-service:
    build: 
      context: ./ai-service
    container_name: robomed-ai-node
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - FLASK_ENV=production
    restart: always

  # Institutional Persistence Registry (Redis)
  redis:
    image: redis:alpine
    container_name: robomed-redis
    ports:
      - "6379:6379"
    restart: always

  # Institutional Clinical Registry (Backend)
  backend:
    build:
      context: ./backend
    container_name: robomed-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai-service:5001
      - REDIS_URL=redis://redis:6379
    depends_on:
      - ai-service
      - redis
    restart: always

  # Institutional Frontend Gateway (Nginx)
  frontend:
    build:
      context: ./frontend
    container_name: robomed-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

# Statutory Registry Networks (Default Bridge)
networks:
  default:
    name: robomed-institutional-net
