# RoboMed Institutional Production Stack — Formal Governance Edition
version: '3.8'

services:
  # ── Institutional Database ──────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: robomed_db
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - robomed_network

  # ── Clinical Logic Manifold (Backend) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: robomed_backend
    restart: always
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/robomed_prod
      - AI_SERVICE_URL=http://ai-service:5001
      # JWT Secrets and Cloudinary credentials should be provided via .env
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    networks:
      - robomed_network

  # ── Diagnostic Intelligence Node (AI) ────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: robomed_ai
    restart: always
    environment:
      - FLASK_ENV=production
    networks:
      - robomed_network

  # ── External Portal Delivery (Frontend) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: robomed_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - robomed_network

# ── Shared Infrastructure Matrix ──────────────────────────────────────────────
networks:
  robomed_network:
    driver: bridge

volumes:
  mongo_data:
