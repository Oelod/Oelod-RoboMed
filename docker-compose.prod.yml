# RoboMed Institutional Production Stack — Formal Governance Edition
version: '3.8'

services:
  # ── Institutional Database (Persistence Manifold) ───────────────────────────
  mongodb:
    image: mongo:7
    container_name: robomed_db
    restart: always
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - robomed_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Institutional Cache (Scaling Manifold) ──────────────────────────────────
  redis:
    image: redis:alpine
    container_name: robomed_cache
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - robomed_network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"

  # ── Clinical Logic Manifold (Backend) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: robomed_backend
    restart: always
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/robomed_prod
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:5001
    env_file:
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - robomed_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  # ── Diagnostic Intelligence Node (AI) ────────────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: robomed_ai
    restart: always
    environment:
      - FLASK_ENV=production
    networks:
      - robomed_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

  # ── External Portal Delivery (Frontend) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: robomed_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - robomed_network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"

# ── Shared Infrastructure Matrix ──────────────────────────────────────────────
networks:
  robomed_network:
    driver: bridge

volumes:
  mongo_data:
